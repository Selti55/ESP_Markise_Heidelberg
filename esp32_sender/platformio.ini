; PlatformIO Projektkonfiguration für LILYGO T-Energy-S3
; ESP32-Sender/Empfänger mit ESP-NOW

[env:lilygo_tenergy_s3]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino

monitor_speed = 115200
monitor_filters = esp32_exception_decoder

build_type = debug
build_flags =
  -DARDUINO_USB_MODE=1
  -DARDUINO_USB_CDC_ON_BOOT=1
  -DCORE_DEBUG_LEVEL=5

lib_deps =
